<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Case Reviews | Signal & Trace</title>
  <meta name="description" content="Case reviews and scam analysis from Signal & Trace. Real-world breakdowns of suspicious claims, deceptive platforms, and structured online research." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['system-ui', 'sans-serif'],
            display: ['"Orbitron"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(34,211,238,0.12), 0 12px 40px rgba(2,8,23,0.65)',
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: #cbd5e1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const NAV_ITEMS = [
      { label: 'HOME', href: 'index.html' },
      { label: 'TOOLS', href: 'tools.html' },
      { label: 'BLOG', href: 'blog.html' },
      { label: 'RESOURCES', href: 'resources.html' },
      { label: 'ABOUT', href: 'about.html' },
    ];

    const CASE_REVIEWS = [
      {
        title: "The myIQ Investigation",
        excerpt: "A breakdown of how structured OSINT, Google dorks, NotebookLM, and Gemini were used to map the hidden architecture of a deceptive subscription platform and force a full refund.",
        category: "CASE REVIEW",
        date: "Apr 2026",
        link: "posts/myiq-investigation.html",
        status: "live"
      },
      {
        title: "More case reviews are in production",
        excerpt: "Additional scam analysis and research breakdowns will be added here as new cases are finalized and written up.",
        category: "COMING SOON",
        date: "In Production",
        link: "#",
        status: "placeholder"
      }
    ];

    function Navbar() {
      const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);

      return (
        <nav className="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <a href="index.html" className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl border border-cyan-500/30 bg-cyan-500/10 flex items-center justify-center text-cyan-400 font-bold shadow-glow">
                S
              </div>
              <div>
                <div className="font-mono text-[10px] text-cyan-400 tracking-[0.25em]">SIGNAL &amp;</div>
                <div className="font-display text-sm sm:text-lg text-slate-100 tracking-[0.14em]">TRACE</div>
              </div>
            </a>

            <div className="hidden md:flex gap-6 font-mono text-xs font-semibold tracking-widest text-slate-400">
              {NAV_ITEMS.map((item) => (
                <a
                  key={item.label}
                  href={item.href}
                  className={item.label === 'BLOG' ? 'hover:text-cyan-400 transition-colors' : 'hover:text-cyan-400 transition-colors'}
                >
                  {item.label}
                </a>
              ))}
            </div>

            <div className="md:hidden flex items-center">
              <button
                onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                className="text-slate-400 hover:text-cyan-400 focus:outline-none transition-colors p-2"
                aria-label="Toggle menu"
              >
                <svg className="w-6 h-6" fill="none" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" viewBox="0 0 24 24" stroke="currentColor">
                  {isMobileMenuOpen ? (
                    <path d="M6 18L18 6M6 6l12 12"></path>
                  ) : (
                    <path d="M4 6h16M4 12h16M4 18h16"></path>
                  )}
                </svg>
              </button>
            </div>
          </div>

          {isMobileMenuOpen && (
            <div className="md:hidden border-t border-slate-800 bg-slate-950/95 px-4 pt-2 pb-4 space-y-1 shadow-glow">
              {NAV_ITEMS.map((item) => (
                <a
                  key={item.label}
                  href={item.href}
                  className="block px-3 py-3 rounded-lg font-mono text-xs font-semibold tracking-widest text-slate-300 hover:bg-slate-900 hover:text-cyan-400 transition-colors"
                >
                  {item.label}
                </a>
              ))}
            </div>
          )}
        </nav>
      );
    }

    function Hero() {
      return (
        <section className="border-b border-slate-800 bg-gradient-to-b from-slate-950 to-slate-900/60">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-24">
            <div className="max-w-3xl">
              <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-cyan-500/20 bg-cyan-500/10 text-cyan-400 font-mono text-[10px] tracking-[0.22em] uppercase mb-6">
                Scam Analysis · Verification · Research Logic
              </div>
              <h1 className="font-display text-4xl sm:text-6xl leading-[0.95] text-white mb-6 uppercase tracking-tighter">
                Case <span className="text-cyan-400">Reviews</span>
              </h1>
              <p className="text-slate-400 text-lg sm:text-xl leading-relaxed">
                Real-world breakdowns of deceptive platforms, suspicious claims, and online research workflows that move from surface noise to usable structure.
              </p>
            </div>
          </div>
        </section>
      );
    }

    function Intro() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-10 sm:py-12">
          <div className="grid lg:grid-cols-[1.15fr_0.85fr] gap-5">
            <div className="rounded-2xl border border-slate-800 bg-slate-900/50 p-6 sm:p-7 shadow-glow">
              <div className="font-mono text-xs tracking-[0.22em] text-cyan-400 mb-3">WHAT THESE ARE</div>
              <h2 className="text-2xl sm:text-3xl text-white font-bold mb-4">Case-based research breakdowns</h2>
              <p className="text-slate-400 text-base sm:text-lg leading-relaxed">
                These reviews are built to show the actual logic behind online investigations. The goal is not drama. The goal is to show how search anchors, entity mapping, technical checks, and structured reasoning can expose what a platform or claim is really built on.
              </p>
            </div>

            <div className="rounded-2xl border border-slate-800 bg-slate-950/70 p-6 sm:p-7 shadow-glow">
              <div className="font-mono text-xs tracking-[0.22em] text-cyan-400 mb-3">WHAT YOU WILL SEE</div>
              <ul className="space-y-3 text-sm sm:text-base text-slate-300">
                <li className="flex gap-3"><span className="text-cyan-400">•</span><span>Scam analysis and suspicious platform reviews</span></li>
                <li className="flex gap-3"><span className="text-cyan-400">•</span><span>Entity and infrastructure mapping</span></li>
                <li className="flex gap-3"><span className="text-cyan-400">•</span><span>Search methodology and pressure-test logic</span></li>
                <li className="flex gap-3"><span className="text-cyan-400">•</span><span>Practical lessons that can be reused</span></li>
              </ul>
            </div>
          </div>
        </section>
      );
    }

    function ReviewList() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-4 pb-16">
          <div className="grid gap-6">
            {CASE_REVIEWS.map((item, i) => (
              item.status === "live" ? (
                <a
                  key={i}
                  href={item.link}
                  className="group rounded-2xl border border-slate-800 bg-slate-900/50 p-6 sm:p-8 flex flex-col md:flex-row md:items-center justify-between gap-6 hover:border-cyan-500/30 transition-all shadow-glow hover:-translate-y-1"
                >
                  <div className="max-w-3xl">
                    <div className="flex items-center gap-4 mb-4">
                      <span className="font-mono text-[10px] tracking-widest text-cyan-500 uppercase">{item.category}</span>
                      <span className="w-1 h-1 rounded-full bg-slate-700"></span>
                      <span className="font-mono text-[10px] tracking-widest text-slate-400 uppercase">{item.date}</span>
                    </div>
                    <h2 className="text-xl sm:text-2xl font-bold text-white mb-3 group-hover:text-cyan-400 transition-colors">
                      {item.title}
                    </h2>
                    <p className="text-slate-400 leading-relaxed text-sm sm:text-base">
                      {item.excerpt}
                    </p>
                  </div>
                  <div className="shrink-0 mt-4 md:mt-0">
                    <span className="inline-flex items-center gap-2 text-cyan-400 font-mono text-xs tracking-widest font-bold group-hover:gap-3 transition-all">
                      READ CASE REVIEW &rarr;
                    </span>
                  </div>
                </a>
              ) : (
                <div
                  key={i}
                  className="rounded-2xl border border-slate-800/50 bg-slate-900/20 p-6 sm:p-8 flex flex-col md:flex-row md:items-center justify-between gap-6 opacity-70"
                >
                  <div className="max-w-3xl">
                    <div className="flex items-center gap-4 mb-4">
                      <span className="font-mono text-[10px] tracking-widest text-slate-500 uppercase">{item.category}</span>
                      <span className="w-1 h-1 rounded-full bg-slate-700"></span>
                      <span className="font-mono text-[10px] tracking-widest text-slate-600 uppercase">{item.date}</span>
                    </div>
                    <h2 className="text-xl sm:text-2xl font-bold text-slate-300 mb-3">{item.title}</h2>
                    <p className="text-slate-500 leading-relaxed text-sm sm:text-base">{item.excerpt}</p>
                  </div>
                  <div className="shrink-0">
                    <span className="inline-block px-4 py-2 rounded-lg border border-slate-700 bg-slate-800/50 text-slate-400 font-mono text-[10px] tracking-widest font-bold uppercase">
                      In Production
                    </span>
                  </div>
                </div>
              )
            ))}
          </div>
        </section>
      );
    }

    function CTA() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 pb-16">
          <div className="rounded-3xl border border-slate-800 bg-gradient-to-br from-slate-900/80 to-slate-950 p-8 sm:p-10 shadow-glow">
            <div className="font-mono text-xs tracking-[0.25em] text-cyan-400 mb-3">NEXT STEP</div>
            <h2 className="text-2xl sm:text-3xl text-white font-bold mb-4">Use the tools, then read the logic behind them.</h2>
            <p className="text-slate-300 text-base sm:text-lg leading-relaxed max-w-4xl mb-6">
              The strongest use of this site is simple: use the tools to generate leads, then use the blog and case reviews to understand the reasoning behind what you are seeing.
            </p>
            <div className="flex flex-col sm:flex-row gap-3">
              <a href="tools.html" className="px-6 py-3 rounded-xl bg-cyan-500/15 border border-cyan-400/30 text-cyan-300 font-mono text-sm tracking-widest font-bold text-center shadow-glow">
                EXPLORE TOOLS
              </a>
              <a href="blog.html" className="px-6 py-3 rounded-xl bg-slate-900/70 border border-slate-700 text-slate-100 font-mono text-sm tracking-widest font-bold text-center">
                VIEW ALL BLOG POSTS
              </a>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="border-t border-slate-800 py-12 bg-slate-950/50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col items-center">
            <div className="font-display text-[14px] text-slate-600 tracking-[0.4em] mb-8">
              SIGNAL &amp; TRACE // 2026
            </div>
            <div className="flex gap-8 font-mono text-[10px] text-slate-400 tracking-[0.2em] font-bold">
              <a href="tools.html" className="hover:text-cyan-400">TOOLS</a>
              <a href="blog.html" className="hover:text-cyan-400">BLOG</a>
              <a href="resources.html" className="hover:text-cyan-400">RESOURCES</a>
              <a href="about.html" className="hover:text-cyan-400">ABOUT</a>
            </div>
          </div>
        </footer>
      );
    }

    function App() {
      return (
        <div className="min-h-screen bg-slate-950 text-slate-300 font-sans selection:bg-cyan-500/30">
          <Navbar />
          <Hero />
          <Intro />
          <ReviewList />
          <CTA />
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
