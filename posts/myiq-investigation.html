    function EvidenceGrid() {
      const items = [

    function DownloadSection() {
      return (
        <section className="max-w-5xl mx-auto px-4 sm:px-6 pb-4">
          <div className="grid md:grid-cols-2 gap-5">
            <div className="premium-card rounded-2xl p-6"><div className="relative"><div className="font-mono text-[10px] tracking-[0.18em] uppercase text-cyan-400 mb-3">Download 01</div><h3 className="text-white text-xl font-bold mb-3">Case File Summary PDF</h3><p className="text-sm text-slate-400 leading-relaxed mb-5">Save the typed case file version for reference, sharing, or offline review.</p><a href="../AI_Powered_Scam_Mapping.pdf" className="inline-flex px-4 py-2 rounded-xl bg-cyan-500/15 border border-cyan-400/30 text-cyan-300 font-mono text-sm tracking-widest font-bold shadow-cyan" download>DOWNLOAD CASE FILE</a></div></div>
            <div className="premium-card rounded-2xl p-6"><div className="relative"><div className="font-mono text-[10px] tracking-[0.18em] uppercase text-cyan-400 mb-3">Download 02</div><h3 className="text-white text-xl font-bold mb-3">Structured Research Protocol PDF</h3><p className="text-sm text-slate-400 leading-relaxed mb-5">Download the branded workflow guide for organizing and pressure-testing online research.</p><a href="../Structured_Research_Protocol.pdf" className="inline-flex px-4 py-2 rounded-xl bg-slate-950 border border-slate-700 text-slate-100 font-mono text-sm tracking-widest font-bold" download>DOWNLOAD PROTOCOL</a></div></div>

    function ArticleBody() {
      return (
        <section className="max-w-5xl mx-auto px-4 sm:px-6 py-10 sm:py-12">
          <article className="premium-card rounded-3xl p-6 sm:p-8 lg:p-10">
            <div className="relative post-content text-slate-300 text-[15px] sm:text-base">
              <h2>1. Why this case matters</h2>
              <p>The myIQ case began with a simple consumer problem: a low-cost online offer appeared to lead into a recurring subscription charge. That kind of dispute is common. What made this case useful was the research process that followed.</p>
              <p>Instead of stopping at a generic refund request, the work shifted into public-source research. The question became practical: what can be learned from billing text, website records, public filings, trademark references, support communications, and search-engine traces?</p>
              <p><strong>Important boundary:</strong> this article is not a legal finding, law-enforcement report, or final determination of wrongdoing. It is a case review showing how to build a structured research file from public and user-held information.</p>

              <h2>2. The starting point: the billing clue</h2>
              <p>The strongest starting point in many subscription disputes is not the homepage. It is the billing descriptor. A homepage can be rewritten. Marketing copy can change. But billing text often contains hard anchors: merchant names, locations, abbreviations, or payment-routing clues.</p>
              <p>In this case, the billing descriptor became a research lead because it included references consistent with the platform name, a location in St. Julian’s, Malta, and the text <code className="inline">MelMT</code>.</p>
              <p>That did not prove the full structure by itself. It created a focused research question: what entities, payment processors, registry records, or public documents are connected to that descriptor?</p>

              <h2>3. Search anchors used in the review</h2>
              <p>The useful search strategy was to stop searching broad phrases and start searching anchors. Broad searches tend to return marketing pages, review noise, SEO content, and unrelated results. Anchor searches are narrower and harder to bury.</p>
              <ul>
                <li><strong>Address anchor:</strong> <code className="inline">"2093 Philadelphia Pike #3129"</code></li>
                <li><strong>Wyoming registry anchor:</strong> <code className="inline">site:wyobiz.wyo.gov "MTA GLOBAL LLC"</code></li>
                <li><strong>Address and entity anchor:</strong> <code className="inline">"1309 Coffeen Ave" "MTA Global"</code></li>
                <li><strong>Billing descriptor anchor:</strong> <code className="inline">"MYIQ.COM EU ST. JULIANS MelMT"</code></li>
                <li><strong>New York registry anchor:</strong> <code className="inline">site:dos.ny.gov "Envest Research"</code></li>
              </ul>
              <p>The purpose of these searches was not to assume guilt. The purpose was to identify stable data points that could be checked, saved, compared, and used to map the subscription path.</p>

              <h2>4. The working map</h2>
              <p>The research produced a working map with three useful buckets. These labels are analytical buckets, not court findings.</p>
              <h3>Consumer-facing entity</h3>
              <p>Envest Research Inc. appeared in the research as a relevant consumer-facing or operational entity. The public version of the case should avoid overstating the role beyond what records and platform materials directly support.</p>
              <h3>Trademark or IP-related lead</h3>
              <p>MTA Global LLC appeared as a Wyoming-related lead connected to trademark or brand-asset research. This matters because public researchers often need to separate the website operator, brand owner, registered agent, and payment processor instead of assuming they are all the same entity.</p>
              <h3>Payment descriptor lead</h3>
              <p>The Malta-related billing descriptor was the most important practical clue. It gave the dispute a concrete escalation path because payment processors and merchant accounts are often more sensitive pressure points than front-line support scripts.</p>

              <h2>5. How AI helped without replacing verification</h2>
              <p>The research stack used NotebookLM and Gemini to organize the file. NotebookLM worked as the source base. Gemini worked as a research partner for comparison, summarization, and next-step planning.</p>
              <p>The useful workflow was simple:</p>
              <ul>
                <li><strong>Capture:</strong> save registry pages, billing text, support messages, search results, and notes.</li>
                <li><strong>Organize:</strong> group findings by entity, jurisdiction, payment clue, and open question.</li>
                <li><strong>Grade:</strong> separate observed facts from public-record leads, inferences, and unverified leads.</li>
                <li><strong>Test:</strong> ask what would disprove the map or weaken the claim.</li>
                <li><strong>Output:</strong> create a short, clear summary that can be used in a dispute or report.</li>
              </ul>
              <p>The rule is important: AI can help organize evidence, but it cannot turn weak evidence into strong evidence. If the source does not support a claim, the claim stays weak.</p>

              <h2>6. Refund leverage: why the map mattered</h2>
              <p>In the support exchange, the first response did not resolve the full dispute. The useful shift happened when the complaint stopped sounding like a normal support request and started looking like a documented research file.</p>
              <p>The message did not need to be emotional. It needed to show that the issue had been mapped: the consumer-facing entity, the public-record leads, and the payment descriptor were all identified and could be escalated if needed.</p>
              <p>That kind of specificity changes the risk calculation. A small refund is cheap. A well-documented complaint involving payment descriptors, public filings, and regulator-ready notes is more expensive to ignore.</p>

              <h2>7. What this does and does not prove</h2>
              <p><strong>It does show</strong> that a consumer dispute can be strengthened through structured public-source research.</p>
              <p><strong>It does show</strong> that billing descriptors, physical addresses, registry records, and trademark leads can help map a subscription funnel.</p>
              <p><strong>It does not prove</strong> individual ownership, intent, fraud, or a complete beneficial-ownership structure unless direct documents support those specific claims.</p>
              <p><strong>It does not require</strong> the public writer to make every possible allegation. The stronger move is to show the method and let the documented trail carry the weight.</p>

              <h2>8. Truth-seeker checklist</h2>
              <ul>
                <li><strong>Start with the billing descriptor.</strong> It may contain the best hard clue in the entire dispute.</li>
                <li><strong>Dork the anchors.</strong> Use exact addresses, registry names, entity names, and unusual abbreviations.</li>
                <li><strong>Save sources immediately.</strong> Screenshots, URLs, PDFs, support messages, and bank text should be preserved before they change.</li>
                <li><strong>Separate evidence levels.</strong> Do not confuse a lead with a fact.</li>
                <li><strong>Use AI for organization, not invention.</strong> Make the model cite what it is using and flag what remains uncertain.</li>
                <li><strong>Escalate with specifics.</strong> A mapped complaint is stronger than a vague complaint.</li>
              </ul>

              <h2>Final takeaway</h2>
              <p>The myIQ case is valuable because it shows the difference between anger and structure. Anger says, “I was charged unfairly.” Structure says, “Here is the billing descriptor, here are the public-record leads, here is the entity map, here are the unresolved questions, and here is where I will escalate next.”</p>
              <p><strong>Research. Verification. Clarity.</strong> That is the Signal &amp; Trace method.</p>
            </div>
          </article>
        </section>
      );
    }
