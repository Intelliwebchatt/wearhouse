<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Workflows & Prompts | Signal & Trace</title>
  <meta name="description" content="Step-by-step instructions on using AI partners to pressure-test evidence and map networks." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['system-ui', 'sans-serif'],
            display: ['"Orbitron"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(34,211,238,0.12), 0 12px 40px rgba(2,8,23,0.65)',
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: #cbd5e1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const NAV_ITEMS = [
      { label: 'HOME', href: 'index.html' },
      { label: 'TOOLS', href: 'tools.html' },
      { label: 'BLOG', href: 'blog.html' },
      { label: 'CASE REVIEWS', href: 'case-reviews.html' },
      { label: 'AI WORKFLOWS', href: 'ai-workflows.html' },
      { label: 'ABOUT', href: 'about.html' },
    ];

    const WORKFLOWS = [
      {
        title: "New to Research? Start with the \"Partner\" System.",
        excerpt: "The internet is noisy. To find the truth, you need a system. Learn how I use NotebookLM and Google Gemini as a \"Digital Case File\" to organize scattered leads into clear facts.",
        category: "METHODOLOGY",
        tools: ["Gemini", "NotebookLM"],
        link: "posts/ai-research-workflows.html",
        isReady: true
      },
      {
        title: "Automating Source Verification with AI",
        excerpt: "A prompt sequence designed to force AI to evaluate source credibility before accepting a claim as fact. Stop hallucinated evidence in its tracks.",
        category: "PROMPT PACK",
        tools: ["Gemini Advanced"],
        link: "#",
        isReady: false
      },
      {
        title: "Mapping Corporate Networks via NotebookLM",
        excerpt: "How to upload messy state business filings and PDF reports into NotebookLM to generate instant connection maps and timeline contradictions.",
        category: "WORKFLOW",
        tools: ["NotebookLM"],
        link: "#",
        isReady: false
      }
    ];

    function Navbar() {
      const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);

      return (
        <nav className="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <a href="index.html" className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl border border-cyan-500/30 bg-cyan-500/10 flex items-center justify-center text-cyan-400 font-bold shadow-glow">S</div>
              <div>
                <div className="font-mono text-[10px] text-cyan-400 tracking-[0.25em]">SIGNAL &amp;</div>
                <div className="font-display text-sm sm:text-lg text-slate-100 tracking-[0.14em]">TRACE</div>
              </div>
            </a>

            <div className="hidden md:flex gap-6 font-mono text-xs font-semibold tracking-widest text-slate-400">
              {NAV_ITEMS.map((item) => (
                <a 
                  key={item.label} 
                  href={item.href} 
                  className={item.label === 'AI WORKFLOWS' ? 'text-cyan-400' : 'hover:text-cyan-400 transition-colors'}
                >
                  {item.label}
                </a>
              ))}
            </div>

            <div className="md:hidden flex items-center">
              <button 
                onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                className="text-slate-400 hover:text-cyan-400 focus:outline-none transition-colors p-2"
              >
                <svg className="w-6 h-6" fill="none" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" viewBox="0 0 24 24" stroke="currentColor">
                  {isMobileMenuOpen ? (
                    <path d="M6 18L18 6M6 6l12 12"></path>
                  ) : (
                    <path d="M4 6h16M4 12h16M4 18h16"></path>
                  )}
                </svg>
              </button>
            </div>
          </div>

          {isMobileMenuOpen && (
            <div className="md:hidden border-t border-slate-800 bg-slate-950/95 px-4 pt-2 pb-4 space-y-1 shadow-glow">
              {NAV_ITEMS.map((item) => (
                <a 
                  key={item.label} 
                  href={item.href} 
                  className="block px-3 py-3 rounded-lg font-mono text-xs font-semibold tracking-widest text-slate-300 hover:bg-slate-900 hover:text-cyan-400 transition-colors"
                >
                  {item.label}
                </a>
              ))}
            </div>
          )}
        </nav>
      );
    }

    function HubHeader() {
      return (
        <section className="border-b border-slate-800 bg-gradient-to-b from-slate-950 to-slate-900/60">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-24">
            <div className="max-w-3xl">
              <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-cyan-500/20 bg-cyan-500/10 text-cyan-400 font-mono text-[10px] tracking-[0.22em] uppercase mb-6">
                Systematized Research · AI
              </div>
              <h1 className="font-display text-4xl sm:text-6xl leading-[0.95] text-white mb-6 uppercase tracking-tighter">
                AI <span className="text-cyan-400">Workflows</span>
              </h1>
              <p className="text-slate-400 text-lg sm:text-xl leading-relaxed">
                Step-by-step instructions on using AI partners to pressure-test evidence, organize leads, and map networks without trusting them blindly.
              </p>
            </div>
          </div>
        </section>
      );
    }

    function WorkflowList() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-16">
          <div className="grid gap-6">
            {WORKFLOWS.map((workflow, i) => (
              workflow.isReady ? (
                <a key={i} href={workflow.link} className="group rounded-2xl border border-slate-800 bg-slate-900/50 p-6 sm:p-8 flex flex-col md:flex-row md:items-center justify-between gap-6 hover:border-cyan-500/30 transition-all shadow-glow hover:-translate-y-1">
                  <div className="max-w-3xl">
                    <div className="flex flex-wrap items-center gap-3 mb-4">
                      <span className="font-mono text-[10px] tracking-widest text-cyan-500 border border-cyan-500/30 px-2 py-1 rounded uppercase bg-cyan-500/10">
                        {workflow.category}
                      </span>
                      {workflow.tools.map(tool => (
                        <span key={tool} className="font-mono text-[10px] tracking-widest text-slate-400 uppercase">
                          + {tool}
                        </span>
                      ))}
                    </div>
                    <h2 className="text-xl sm:text-2xl font-bold text-white mb-3 group-hover:text-cyan-400 transition-colors">{workflow.title}</h2>
                    <p className="text-slate-400 leading-relaxed text-sm sm:text-base">{workflow.excerpt}</p>
                  </div>
                  <div className="shrink-0 mt-4 md:mt-0">
                    <span className="inline-flex items-center gap-2 text-cyan-400 font-mono text-xs tracking-widest font-bold group-hover:gap-3 transition-all">
                      ACCESS WORKFLOW &rarr;
                    </span>
                  </div>
                </a>
              ) : (
                <div key={i} className="rounded-2xl border border-slate-800/50 bg-slate-900/20 p-6 sm:p-8 flex flex-col md:flex-row md:items-center justify-between gap-6 opacity-70">
                  <div className="max-w-3xl">
                    <div className="flex flex-wrap items-center gap-3 mb-4">
                      <span className="font-mono text-[10px] tracking-widest text-slate-500 border border-slate-700 px-2 py-1 rounded uppercase">
                        {workflow.category}
                      </span>
                    </div>
                    <h2 className="text-xl sm:text-2xl font-bold text-slate-300 mb-3">{workflow.title}</h2>
                    <p className="text-slate-500 leading-relaxed text-sm sm:text-base">{workflow.excerpt}</p>
                  </div>
                  <div className="shrink-0 mt-4 md:mt-0">
                    <span className="inline-block px-4 py-2 rounded-lg border border-slate-700 bg-slate-800/50 text-slate-400 font-mono text-[10px] tracking-widest font-bold uppercase">
                      In Production
                    </span>
                  </div>
                </div>
              )
            ))}
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="border-t border-slate-800 py-12 bg-slate-950/50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col items-center">
            <div className="font-display text-[14px] text-slate-600 tracking-[0.4em] mb-8">
                SIGNAL &amp; TRACE // 2026
            </div>
            <div className="flex gap-8 font-mono text-[10px] text-slate-400 tracking-[0.2em] font-bold">
                <a href="tools.html" className="hover:text-cyan-400">TOOLS</a>
                <a href="blog.html" className="hover:text-cyan-400">GUIDES</a>
                <a href="about.html" className="hover:text-cyan-400">ABOUT</a>
            </div>
          </div>
        </footer>
      );
    }

    function App() {
      return (
        <div className="min-h-screen bg-slate-950 font-sans selection:bg-cyan-500/30">
          <Navbar />
          <HubHeader />
          <WorkflowList />
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
