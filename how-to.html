<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>How-To Library | Signal & Trace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['system-ui', 'sans-serif'],
            display: ['"Orbitron"', 'system-ui', 'sans-serif'],
          },
          boxShadow: { glow: '0 0 0 1px rgba(34,211,238,0.12), 0 12px 40px rgba(2,8,23,0.65)' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #020617; color: #cbd5e1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const NAV_ITEMS = [
      { label: 'HOME', href: 'index.html' },
      { label: 'TOOLS', href: 'tools.html' },
      { label: 'HOW-TO', href: 'how-to.html' },
      { label: 'CASE REVIEWS', href: 'case-reviews.html' },
      { label: 'AI WORKFLOWS', href: 'ai-workflows.html' },
      { label: 'ABOUT', href: 'about.html' },
    ];

    const POSTS = [
      {
        id: 'ST-003',
        title: 'How to Use AI to Organize Research', 
        slug: 'how-to-use-ai-to-organize-research-without-trusting-it-blindly',
        category: 'AI Workflows',
        excerpt: 'A practical system for using NotebookLM and Gemini as a central case file to organize scattered leads.',
        status: 'live'
      },
      {
        id: 'ST-004',
        title: 'How to Check Whether a Website Is Real', 
        slug: 'how-to-check-whether-a-website-is-real',
        category: 'Verification Guides',
        excerpt: 'A practical workflow for checking domain history, footprint, and technical reputation before you trust a site.',
        status: 'live'
      }
    ];

    function Navbar() {
      return (
        <nav className="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50 uppercase">
          <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-lg border border-cyan-500/30 bg-cyan-500/10 flex items-center justify-center text-cyan-400 font-bold shadow-glow uppercase">S</div>
              <span className="font-display text-sm tracking-widest text-slate-100 uppercase">SIGNAL & TRACE</span>
            </a>
            <div className="hidden lg:flex gap-5 font-mono text-[10px] text-slate-400 uppercase tracking-widest">
              {NAV_ITEMS.map(item => <a key={item.label} href={item.href} className="hover:text-cyan-400">{item.label}</a>)}
            </div>
          </div>
        </nav>
      );
    }

    function App() {
      return (
        <div className="min-h-screen">
          <Navbar />
          <header className="py-16 text-center border-b border-slate-800 bg-slate-900/50 uppercase">
             <div className="max-w-7xl mx-auto px-4">
                <h1 className="font-display text-4xl text-white mb-4 uppercase tracking-widest leading-tight">How-To <span className="text-cyan-400">Library</span></h1>
                <p className="font-mono text-slate-400 max-w-xl mx-auto text-xs tracking-widest lowercase italic">
                  Structured workflows and methods for digital verification.
                </p>
             </div>
          </header>

          <main className="max-w-4xl mx-auto px-4 py-12 grid gap-6">
            {POSTS.map(post => (
              <a 
                key={post.id} 
                href={`posts/${post.slug}.html`} 
                className="p-8 rounded-2xl border border-slate-800 bg-slate-900/40 hover:border-cyan-500/50 hover:bg-slate-900 transition-all group shadow-glow"
              >
                <div className="flex justify-between items-start mb-3">
                  <span className="font-mono text-[10px] uppercase tracking-widest text-cyan-400 font-bold italic">// {post.category}</span>
                </div>
                <h3 className="font-display font-bold text-xl uppercase mb-3 text-white group-hover:text-cyan-400 transition-colors tracking-tight">{post.title}</h3>
                <p className="text-sm text-slate-500 mb-6 leading-relaxed">{post.excerpt}</p>
                <span className="font-mono text-[10px] text-cyan-400 uppercase tracking-widest font-bold">Read Full Guide →</span>
              </a>
            ))}
          </main>
          
          <footer className="py-12 text-center border-t border-slate-800 uppercase">
             <div className="font-mono text-[10px] text-slate-600 tracking-[0.3em] uppercase italic">© 2026 Signal & Trace // Shane Lockhart</div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
