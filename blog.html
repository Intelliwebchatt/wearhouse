<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockhart's Warehouse | Intelligence Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .text-cyan-accent { color: #22d3ee; }
        .bg-card-navy { background-color: #0f172a; }
        .border-slate-custom { border-color: #1e293b; }
    </style>
</head>
<body class="text-slate-300 min-h-screen">

    <nav class="bg-[#020617] border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#0f172a] border border-[#22d3ee]/30 flex items-center justify-center rounded shadow-[0_0_15px_rgba(34,211,238,0.1)]">
                        <span class="text-[#22d3ee] font-bold">L</span>
                    </div>
                    <span class="font-bold text-sm tracking-[0.2em] text-white uppercase">Lockhart's <span class="text-cyan-accent">Warehouse</span></span>
                </div>
                <a href="index.html" class="border border-slate-700 hover:border-[#22d3ee] text-white px-4 py-2 rounded text-xs font-bold tracking-widest uppercase transition-all">
                    ← Back to Arsenal
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        
        <header class="mb-16">
            <h1 class="text-4xl md:text-6xl font-bold text-white mb-6">Intelligence <span class="text-cyan-accent">Archive.</span></h1>
            <p class="text-slate-400 max-w-2xl text-lg leading-relaxed">
                Access advanced investigative tools, deep-dive case studies, and field-tested strategies for digital intelligence.
            </p>
        </header>

        <section class="mb-20">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="featured-grid">
                </div>
        </section>

        <section class="bg-card-navy rounded-xl border border-slate-800 overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-slate-800 bg-[#0b1221] flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h2 class="text-xl font-bold text-white tracking-tight">Tactical Database</h2>
                    <p class="text-xs text-slate-500 uppercase tracking-widest mt-1">Search methodology by keyword</p>
                </div>
                <div class="relative w-full md:w-80">
                    <input type="text" id="blog-search" placeholder="Filter archive..." 
                           class="w-full bg-[#020617] border border-slate-700 text-white pl-4 pr-10 py-3 rounded focus:border-[#22d3ee] outline-none transition-all text-sm placeholder-slate-600">
                    <span class="absolute right-3 top-3.5 text-slate-500 text-sm">🔍</span>
                </div>
            </div>

            <div id="posts-list" class="divide-y divide-slate-800/50">
                </div>
        </section>
    </main>

    <script>
        const INTEL_POSTS = [
            { id: "INT-01", title: "Tracing Financial Friction Points", category: "Corporate", date: "APR 2026", excerpt: "Detecting shell company structures through automated registry analysis and legal filings." },
            { id: "INT-02", title: "Subject Digital Reconstruction", category: "People", date: "APR 2026", excerpt: "Advanced techniques for mapping a subject's online presence across archived data fragments." },
            { id: "INT-03", title: "Network Infrastructure Weakpoints", category: "Infra", date: "MAR 2026", excerpt: "Detecting misconfigured servers and leaked internal organizational data points." },
            { id: "INT-04", title: "Legal Chain of Custody for OSINT", category: "Legal", date: "MAR 2026", excerpt: "Maintaining integrity when gathering intelligence for official legal proceedings." },
            { id: "INT-05", title: "Social Engineering Defense Patterns", category: "Tactics", date: "FEB 2026", excerpt: "Analyzing common subject tactics used to obfuscate identities during field operations." }
        ];

        function render() {
            // Render the Top 3 Featured Cards
            document.getElementById('featured-grid').innerHTML = INTEL_POSTS.slice(0, 3).map(post => `
                <div class="bg-card-navy p-8 border border-slate-800 rounded-xl hover:border-[#22d3ee]/40 transition-all group cursor-pointer shadow-lg">
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-[10px] font-bold text-[#22d3ee] tracking-[0.2em] uppercase border border-[#22d3ee]/20 px-2 py-0.5 rounded">${post.category}</span>
                        <span class="text-slate-700 group-hover:text-[#22d3ee] transition-colors">📑</span>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-4 group-hover:text-[#22d3ee] transition-colors leading-tight">${post.title}</h3>
                    <p class="text-slate-400 text-sm mb-6 leading-relaxed line-clamp-2">${post.excerpt}</p>
                    <div class="h-[1px] w-full bg-slate-800 relative">
                        <div class="absolute inset-0 w-0 group-hover:w-full bg-[#22d3ee] transition-all duration-500"></div>
                    </div>
                </div>
            `).join('');
            
            filterArchive("");
        }

        function filterArchive(query) {
            const list = document.getElementById('posts-list');
            const filtered = INTEL_POSTS.filter(p => 
                p.title.toLowerCase().includes(query.toLowerCase()) || 
                p.category.toLowerCase().includes(query.toLowerCase())
            );

            list.innerHTML = filtered.map(p => `
                <div class="p-6 hover:bg-[#111a2e] flex items-center justify-between transition-colors cursor-pointer group">
                    <div class="flex items-center gap-6">
                        <span class="text-[10px] font-mono text-slate-600 group-hover:text-[#22d3ee]">${p.id}</span>
                        <h4 class="font-bold text-slate-300 group-hover:text-white transition-colors">${p.title}</h4>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-bold text-slate-600">${p.date}</span>
                        <span class="text-[#22d3ee] opacity-0 group-hover:opacity-100 transition-opacity text-xs">VIEW →</span>
                    </div>
                </div>
            `).join('');

            if (filtered.length === 0) {
                list.innerHTML = `<p class="text-center text-slate-600 py-12 italic">No tactical files found matching "${query}"</p>`;
            }
        }

        document.getElementById('blog-search').addEventListener('input', e => filterArchive(e.target.value));
        render();
    </script>
</body>
</html>
