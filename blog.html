<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigative Tools & Tactics | Intel Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; } /* Deep Dark Blue-Gray */
        .bg-investigator-yellow { background-color: #ffcc00; }
        .text-investigator-yellow { color: #ffcc00; }
        .border-investigator-yellow { border-color: #ffcc00; }
        .bg-card-dark { background-color: #1e293b; } /* Lighter Dark for Cards */
    </style>
</head>
<body class="text-gray-100 min-h-screen">

    <nav class="bg-[#020617] border-b border-gray-800 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">⚖️</span>
                    <span class="font-bold text-xl tracking-tight uppercase">Inv <span class="text-investigator-yellow">Tools & Tactics</span></span>
                </div>
                <a href="index.html" class="bg-investigator-yellow hover:bg-yellow-400 text-black px-5 py-2 rounded-lg font-bold flex items-center gap-2 transition-all transform active:scale-95 shadow-lg">
                    🏠 Return to Tools
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <section class="mb-16">
            <h2 class="text-2xl font-bold mb-8 flex items-center gap-3 text-white">
                <span class="w-2 h-8 bg-investigator-yellow rounded-full"></span>
                Latest Field Intelligence
            </h2>
            <div id="featured-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                </div>
        </section>

        <section class="bg-[#1e293b] rounded-2xl shadow-2xl border border-gray-800 overflow-hidden">
            <div class="p-6 border-b border-gray-700 bg-[#0f172a] flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-xl font-bold text-white">Archive Index</h2>
                    <p class="text-sm text-gray-400 font-medium">Search tactical methodologies and case files</p>
                </div>
                <div class="relative w-full md:w-96">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
                    <input type="text" id="blog-search" placeholder="Search tactics by keyword..." 
                           class="w-full pl-10 pr-4 py-2.5 bg-[#020617] border border-gray-700 text-white rounded-xl focus:ring-2 focus:ring-yellow-400 focus:border-transparent outline-none transition-all placeholder-gray-500">
                </div>
            </div>

            <div id="posts-list" class="divide-y divide-gray-800">
                </div>
        </section>
    </main>

    <script>
        const BLOG_POSTS = [
            { id: 1, title: "Tracing Financial Friction Points", category: "Corporate", date: "2024-05-20", excerpt: "Identifying shell company structures through automated registry analysis." },
            { id: 2, title: "Digital Footprint Reconstruction", category: "Profiling", date: "2024-05-18", excerpt: "Advanced techniques for mapping a subject's online presence across archived data." },
            { id: 3, title: "Network Infrastructure Weakpoints", category: "Forensics", date: "2024-05-15", excerpt: "Detecting misconfigured servers that leak internal organizational data." },
            { id: 4, title: "Chain of Custody for Digital Intel", category: "Legal", date: "2024-05-10", excerpt: "Maintaining integrity when gathering intelligence for legal proceedings." },
            { id: 5, title: "Social Engineering Defense Patterns", category: "Tactics", date: "2024-05-05", excerpt: "Analyzing common subject tactics used to obfuscate their true identity." }
        ];

        const featuredGrid = document.getElementById('featured-grid');
        const postsList = document.getElementById('posts-list');
        const searchInput = document.getElementById('blog-search');

        function renderBlog() {
            featuredGrid.innerHTML = BLOG_POSTS.slice(0, 3).map(post => `
                <div class="bg-[#1e293b] p-8 rounded-2xl border-b-4 border-investigator-yellow shadow-xl hover:bg-[#334155] transition-all group cursor-pointer">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black uppercase tracking-[0.1em] px-2 py-1 bg-[#0f172a] rounded text-gray-400 border border-gray-700">${post.category}</span>
                        <span class="text-gray-500 group-hover:text-investigator-yellow transition-colors text-2xl">📑</span>
                    </div>
                    <h3 class="text-xl font-bold mt-2 mb-3 leading-tight text-white group-hover:text-yellow-400 transition-colors">${post.title}</h3>
                    <p class="text-gray-400 text-sm mb-6 line-clamp-2">${post.excerpt}</p>
                    <div class="flex items-center gap-2 text-sm font-bold text-investigator-yellow group-hover:translate-x-1 transition-transform">
                        Open File <span>→</span>
                    </div>
                </div>
            `).join('');
            updateList("");
        }

        function updateList(query) {
            const filtered = BLOG_POSTS.filter(post => 
                post.title.toLowerCase().includes(query.toLowerCase()) || 
                post.category.toLowerCase().includes(query.toLowerCase())
            );

            postsList.innerHTML = filtered.map(post => `
                <div class="p-5 hover:bg-[#334155] flex items-center justify-between transition-colors group cursor-pointer">
                    <div class="flex items-center gap-6">
                        <div class="hidden sm:flex w-12 h-12 bg-[#020617] rounded-lg items-center justify-center font-bold text-gray-500 group-hover:bg-investigator-yellow group-hover:text-black transition-colors">
                            ${post.id}
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-200 group-hover:text-white">${post.title}</h4>
                            <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest">${post.category}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-medium text-gray-400">${post.date}</div>
                        <div class="text-[10px] font-bold text-investigator-yellow opacity-0 group-hover:opacity-100 transition-opacity uppercase">Read Intel</div>
                    </div>
                </div>
            `).join('');

            if (filtered.length === 0) {
                postsList.innerHTML = `<p class="text-center text-gray-500 py-12 italic">No tactical files found matching "${query}"</p>`;
            }
        }

        searchInput.addEventListener('input', (e) => updateList(e.target.value));
        renderBlog();
    </script>
</body>
</html>
