<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Signal & Trace | Find Facts. Verify Claims. Cut Through Noise.</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['system-ui', 'sans-serif'],
            display: ['"Orbitron"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(34,211,238,0.12), 0 12px 40px rgba(2,8,23,0.65)',
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: #cbd5e1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const NAV_ITEMS = [
      { label: 'HOME', href: 'index.html' },
      { label: 'TOOLS', href: 'tools.html' },
      { label: 'BLOG', href: 'blog.html' },
      { label: 'ABOUT', href: 'about.html' },
    ];

    const FEATURE_CARDS = [
      {
        title: 'Search Tools',
        href: 'tools.html',
        icon: '🧰',
        text: 'Build smarter searches for people, businesses, usernames, websites, and public-facing online traces.',
      },
      {
        title: 'Verification Methods',
        href: 'blog.html',
        icon: '📘',
        text: 'Simple workflows for checking claims, spotting weak sources, and avoiding bad conclusions.',
      },
      {
        title: 'Scam & Case Notes',
        href: 'blog.html',
        icon: '🕸️',
        text: 'Breakdowns of fake websites, linked scam patterns, misleading claims, and public evidence worth testing.',
      },
      {
        title: 'Background',
        href: 'about.html',
        icon: '🧾',
        text: 'The experience, training, and investigative mindset behind the tools, prompts, and analysis on this site.',
      },
    ];

    const FEATURED_TOOLS = [
      {
        name: 'Research Query Builder',
        status: 'Live',
        text: 'Generate useful search strings for people, businesses, and websites, then run them directly in your preferred engine.',
      },
      {
        name: 'Claim Verification Worksheet',
        status: 'Planned',
        text: 'Break a claim into facts, sources, contradictions, and unknowns before you decide what is true.',
      },
      {
        name: 'Scam Site Research Starter',
        status: 'Planned',
        text: 'Use a structured starting point to check domain, contact details, linked pages, trust signals, and pattern reuse.',
      },
    ];

    const LATEST_POSTS = [
      {
        category: 'HOW-TO',
        title: 'How to Check Whether a Website Is Real',
        excerpt: 'A practical process for checking domains, contact details, copied text, linked pages, and trust signals.',
      },
      {
        category: 'SCAM ANALYSIS',
        title: 'How Fake Sites Get Built to Look Legitimate',
        excerpt: 'What linked scam sites often have in common and where most people miss the pattern.',
      },
      {
        category: 'AI WORKFLOW',
        title: 'How to Use AI to Organize Research Without Trusting It Blindly',
        excerpt: 'Use AI as a filter and structure tool, not as your source of truth.',
      },
    ];

    function Navbar() {
      return (
        <nav className="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <a href="index.html" className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl border border-cyan-500/30 bg-cyan-500/10 flex items-center justify-center text-cyan-400 font-bold shadow-glow">S</div>
              <div>
                <div className="font-mono text-[10px] text-cyan-400 tracking-[0.25em]">SIGNAL &amp;</div>
                <div className="font-display text-sm sm:text-lg text-slate-100 tracking-[0.14em]">TRACE</div>
              </div>
            </a>

            <div className="hidden md:flex gap-6 font-mono text-xs font-semibold tracking-widest text-slate-400">
              {NAV_ITEMS.map((item) => (
                <a
                  key={item.label}
                  href={item.href}
                  className={item.label === 'HOME' ? 'text-cyan-400 hover:text-cyan-300 transition-colors' : 'hover:text-slate-100 transition-colors'}
                >
                  {item.label}
                </a>
              ))}
            </div>
          </div>
        </nav>
      );
    }

    function Hero() {
      const heroImage = 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1600&q=80';

      return (
        <section className="relative overflow-hidden border-b border-slate-800">
          <div
            className="absolute inset-0 bg-cover bg-center"
            style={{ backgroundImage: `url(${heroImage})` }}
          />
          <div className="absolute inset-0 bg-slate-950/80" />
          <div className="absolute inset-0 bg-gradient-to-r from-slate-950 via-slate-950/85 to-slate-950/50" />

          <div className="relative max-w-7xl mx-auto px-4 sm:px-6 py-20 sm:py-28 lg:py-36">
            <div className="max-w-3xl">
              <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-cyan-500/20 bg-cyan-500/10 text-cyan-400 font-mono text-[10px] sm:text-xs tracking-[0.22em] uppercase mb-5">
                Research · Verification · Scam Analysis
              </div>

              <h1 className="font-display text-4xl sm:text-6xl lg:text-7xl leading-[0.95] text-white mb-6">
                Find Facts.<br />
                <span className="text-cyan-400">Verify Claims.</span><br />
                Cut Through Noise.
              </h1>

              <p className="text-slate-300 text-base sm:text-lg lg:text-xl max-w-2xl leading-relaxed mb-8">
                Practical tools, research workflows, and scam breakdowns for people who need better information, smarter searches, and a cleaner way to test what is real.
              </p>

              <div className="flex flex-col sm:flex-row gap-3">
                <a href="tools.html" className="px-6 py-3 rounded-xl bg-cyan-500/15 border border-cyan-400/30 text-cyan-300 font-mono text-sm tracking-widest font-bold text-center shadow-glow">
                  EXPLORE TOOLS
                </a>
                <a href="blog.html" className="px-6 py-3 rounded-xl bg-slate-900/70 border border-slate-700 text-slate-100 font-mono text-sm tracking-widest font-bold text-center">
                  READ CASE NOTES
                </a>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function CredibilityStrip() {
      const items = [
        'Built on real investigative experience and structured research habits',
        'Focused on verification, pattern recognition, and finding signal in noisy information',
        'Practical tools for scam checks, search logic, and truth-finding',
        'Methods and prompts designed for normal people, not just specialists',
      ];

      return (
        <section className="border-b border-slate-800 bg-slate-900/40">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-5 grid md:grid-cols-4 gap-4">
            {items.map((item, index) => (
              <div key={index} className="text-sm text-slate-300 border border-slate-800 rounded-xl bg-slate-950/60 px-4 py-4">
                {item}
              </div>
            ))}
          </div>
        </section>
      );
    }

    function MissionSection() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
          <div className="grid lg:grid-cols-[1.1fr_0.9fr] gap-8 items-start">
            <div>
              <div className="font-mono text-xs tracking-[0.25em] text-cyan-400 mb-3">SITE MISSION</div>
              <h2 className="text-3xl sm:text-4xl text-white font-bold mb-4">Built to be useful, not decorative.</h2>
              <p className="text-slate-400 text-base sm:text-lg leading-relaxed max-w-3xl">
                This site exists to help people search smarter, verify claims, investigate suspicious websites or businesses, and use AI tools without getting lost in noise, weak sourcing, or false certainty.
              </p>
            </div>

            <div className="rounded-2xl border border-slate-800 bg-slate-900/50 p-6 shadow-glow">
              <div className="font-mono text-xs tracking-[0.22em] text-slate-500 mb-4">WHAT BELONGS HERE</div>
              <div className="space-y-3 text-sm text-slate-300">
                <div>• Search and verification tools</div>
                <div>• Research workflows and practical how-to guides</div>
                <div>• Scam breakdowns, case notes, and truth-check articles</div>
                <div>• Background, training, and the thinking behind the work</div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function FeatureGrid() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 pb-16 sm:pb-20">
          <div className="mb-8">
            <div className="font-mono text-xs tracking-[0.25em] text-cyan-400 mb-3">MAIN SECTIONS</div>
            <h2 className="text-2xl sm:text-3xl text-white font-bold">What visitors can do here</h2>
          </div>

          <div className="grid md:grid-cols-2 xl:grid-cols-4 gap-5">
            {FEATURE_CARDS.map((card) => (
              <a key={card.title} href={card.href} className="group rounded-2xl border border-slate-800 bg-slate-900/50 p-6 hover:border-cyan-400/40 hover:bg-slate-900 transition-all shadow-glow">
                <div className="w-12 h-12 rounded-xl bg-slate-950 border border-slate-800 flex items-center justify-center text-2xl mb-5">
                  {card.icon}
                </div>
                <h3 className="text-white text-xl font-bold mb-3 group-hover:text-cyan-300 transition-colors">{card.title}</h3>
                <p className="text-sm text-slate-400 leading-relaxed">{card.text}</p>
                <div className="mt-5 font-mono text-xs tracking-[0.2em] text-cyan-400 uppercase">Open Section →</div>
              </a>
            ))}
          </div>
        </section>
      );
    }

    function FeaturedTools() {
      return (
        <section className="border-y border-slate-800 bg-slate-900/30">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
            <div className="mb-8">
              <div className="font-mono text-xs tracking-[0.25em] text-cyan-400 mb-3">FEATURED TOOLS</div>
              <h2 className="text-2xl sm:text-3xl text-white font-bold">Useful now, with room to grow</h2>
            </div>

            <div className="grid md:grid-cols-3 gap-5">
              {FEATURED_TOOLS.map((tool) => (
                <div key={tool.name} className="rounded-2xl border border-slate-800 bg-slate-950/70 p-6">
                  <div className="flex items-center justify-between gap-3 mb-4">
                    <h3 className="text-white font-bold text-lg">{tool.name}</h3>
                    <span className={`text-[10px] font-mono tracking-[0.2em] px-2 py-1 rounded-full border ${tool.status === 'Live' ? 'text-emerald-300 border-emerald-500/30 bg-emerald-500/10' : 'text-amber-300 border-amber-500/30 bg-amber-500/10'}`}>
                      {tool.status}
                    </span>
                  </div>
                  <p className="text-sm text-slate-400 leading-relaxed">{tool.text}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function LatestPosts() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
          <div className="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-8">
            <div>
              <div className="font-mono text-xs tracking-[0.25em] text-cyan-400 mb-3">LATEST WRITING</div>
              <h2 className="text-2xl sm:text-3xl text-white font-bold">Guides, breakdowns, and workflow notes</h2>
            </div>
            <a href="blog.html" className="font-mono text-xs tracking-[0.2em] text-cyan-400 uppercase">View Full Archive →</a>
          </div>

          <div className="grid md:grid-cols-3 gap-5">
            {LATEST_POSTS.map((post) => (
              <article key={post.title} className="rounded-2xl border border-slate-800 bg-slate-900/50 p-6 hover:border-slate-700 transition-colors">
                <div className="font-mono text-[10px] tracking-[0.22em] text-cyan-400 mb-3">{post.category}</div>
                <h3 className="text-white text-xl font-bold mb-3">{post.title}</h3>
                <p className="text-sm text-slate-400 leading-relaxed">{post.excerpt}</p>
              </article>
            ))}
          </div>
        </section>
      );
    }

    function AboutPreview() {
      return (
        <section className="border-t border-slate-800 bg-gradient-to-b from-slate-950 to-slate-900/60">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-20">
            <div className="grid lg:grid-cols-[0.8fr_1.2fr] gap-8 items-center">
              <div className="rounded-3xl border border-slate-800 bg-slate-950/70 p-8 shadow-glow">
                <div className="w-16 h-16 rounded-2xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center text-3xl mb-5">🧾</div>
                <div className="font-mono text-xs tracking-[0.22em] text-slate-500 mb-3">ABOUT / BACKGROUND</div>
                <h3 className="text-white text-2xl font-bold mb-3">Background, training, and the mindset behind the work.</h3>
                <p className="text-slate-400 text-sm leading-relaxed">
                  The site is public-facing, but it is built on real investigative experience, disciplined case logic, and years spent sorting signal from noise.
                </p>
              </div>

              <div>
                <h2 className="text-2xl sm:text-3xl text-white font-bold mb-4">Experience should build trust, not dominate the site.</h2>
                <p className="text-slate-400 text-base sm:text-lg leading-relaxed mb-6 max-w-3xl">
                  The homepage should stay useful and focused. The deeper background belongs on the about page, where visitors can see the experience and training behind the tools and analysis.
                </p>
                <a href="about.html" className="inline-flex px-6 py-3 rounded-xl bg-cyan-500/15 border border-cyan-400/30 text-cyan-300 font-mono text-sm tracking-widest font-bold shadow-glow">
                  VIEW BACKGROUND
                </a>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="border-t border-slate-800">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8 flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
            <div className="font-mono text-[10px] sm:text-xs text-slate-600 tracking-[0.22em]">
              © {new Date().getFullYear()} SIGNAL &amp; TRACE
            </div>
            <div className="font-mono text-[10px] sm:text-xs text-slate-500 tracking-[0.18em]">
              TOOLS · VERIFICATION · RESEARCH · ANALYSIS
            </div>
          </div>
        </footer>
      );
    }

    function App() {
      return (
        <div className="min-h-screen bg-slate-950 text-slate-300 font-sans selection:bg-cyan-500/30">
          <Navbar />
          <Hero />
          <CredibilityStrip />
          <MissionSection />
          <FeatureGrid />
          <FeaturedTools />
          <LatestPosts />
          <AboutPreview />
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
