<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Signal & Trace | Simple Tools for Serious Research</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['system-ui', 'sans-serif'],
            display: ['"Orbitron"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(34,211,238,0.12), 0 12px 40px rgba(2,8,23,0.65)',
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: #cbd5e1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const NAV_ITEMS = [
      { label: 'HOME', href: 'index.html' },
      { label: 'TOOLS', href: 'tools.html' },
      { label: 'HOW-TO', href: 'how-to.html' },
      { label: 'CASE REVIEWS', href: 'case-reviews.html' },
      { label: 'AI WORKFLOWS', href: 'ai-workflows.html' },
      { label: 'ABOUT', href: 'about.html' },
    ];

    function Navbar() {
      return (
        <nav className="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <a href="index.html" className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl border border-cyan-500/30 bg-cyan-500/10 flex items-center justify-center text-cyan-400 font-bold shadow-glow">S</div>
              <div>
                <div className="font-mono text-[10px] text-cyan-400 tracking-[0.25em]">SIGNAL &amp;</div>
                <div className="font-display text-sm sm:text-lg text-slate-100 tracking-[0.14em]">TRACE</div>
              </div>
            </a>
            <div className="hidden lg:flex gap-5 font-mono text-[11px] font-semibold tracking-[0.16em] text-slate-400">
              {NAV_ITEMS.map((item) => (
                <a key={item.label} href={item.href} className="hover:text-cyan-400 transition-colors uppercase">{item.label}</a>
              ))}
            </div>
          </div>
        </nav>
      );
    }

    function Hero() {
      return (
        <section className="relative py-16 sm:py-24 border-b border-slate-800 bg-gradient-to-b from-slate-950 to-slate-900/50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 text-center">
            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-cyan-500/20 bg-cyan-500/10 text-cyan-400 font-mono text-[10px] uppercase mb-6 tracking-widest">
              Digital Investigation · Verification · AI Analysis
            </div>
            <h1 className="font-display text-4xl sm:text-6xl lg:text-7xl leading-[1.1] text-white mb-6">
              Stop Searching.<br />
              <span className="text-cyan-400">Start Finding.</span>
            </h1>
            <p className="text-slate-400 text-lg sm:text-xl max-w-2xl mx-auto mb-10 leading-relaxed">
              Professional-grade search tools and AI workflows designed for normal people who need to verify facts, find people, or research businesses without the noise.
            </p>
            <div className="flex flex-col sm:flex-row justify-center gap-4">
              <a href="tools.html" className="px-8 py-4 rounded-xl bg-cyan-500/20 border border-cyan-400/30 text-cyan-300 font-mono font-bold shadow-glow tracking-widest uppercase">Explore Tools</a>
              <a href="how-to.html" className="px-8 py-4 rounded-xl bg-slate-900 border border-slate-700 text-slate-100 font-mono font-bold tracking-widest uppercase">Browse Guides</a>
            </div>
          </div>
        </section>
      );
    }

    function StartHere() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-12">
          <div className="rounded-3xl border border-cyan-500/30 bg-cyan-500/5 p-8 sm:p-12 relative overflow-hidden group">
            <div className="absolute top-0 right-0 p-8 text-cyan-500/20 text-9xl font-display opacity-10 group-hover:opacity-20 transition-opacity">01</div>
            <div className="relative z-10 max-w-2xl">
              <div className="font-mono text-xs tracking-[0.2em] text-cyan-400 mb-4 uppercase">Essential Reading</div>
              <h2 className="text-3xl sm:text-4xl text-white font-bold mb-6">New to Research? Start with the "Partner" System.</h2>
              <p className="text-slate-300 text-lg mb-8 leading-relaxed">
                The internet is noisy. To find the truth, you need a system. Learn how I use NotebookLM and Gemini as a "Digital Case File" to organize scattered leads into clear facts.
              </p>
              <a href="blog-notebooklm-workflow.html" className="inline-flex items-center gap-3 text-cyan-400 font-mono font-bold tracking-widest hover:text-cyan-300 transition-colors uppercase">
                Read the Methodology →
              </a>
            </div>
          </div>
        </section>
      );
    }

    function FeatureGrid() {
      const features = [
        { title: 'Search Builders', icon: '🔍', text: 'Generate precise queries to find hidden social profiles, property records, and business filings.', href: 'tools.html' },
        { title: 'AI Workflows', icon: '⚙️', text: 'Step-by-step instructions on using AI partners to pressure-test evidence and map networks.', href: 'ai-workflows.html' },
        { title: 'Case Reviews', icon: '📑', text: 'Real-world breakdowns of scams and suspicious claims using public evidence.', href: 'case-reviews.html' },
        { title: 'Resource Vault', icon: '📁', text: 'Cheat sheets, diagrams, and checklists to keep your investigation on track.', href: 'how-to.html' }
      ];
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-16 grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
          {features.map((f, i) => (
            <a key={i} href={f.href} className="p-8 rounded-2xl border border-slate-800 bg-slate-900/40 hover:border-cyan-500/50 hover:bg-slate-900 transition-all group">
              <div className="text-4xl mb-6 group-hover:scale-110 transition-transform inline-block">{f.icon}</div>
              <h3 className="text-xl text-white font-bold mb-3">{f.title}</h3>
              <p className="text-slate-500 text-sm leading-relaxed mb-6">{f.text}</p>
              <span className="text-[10px] font-mono text-cyan-500 tracking-widest uppercase">Open →</span>
            </a>
          ))}
        </section>
      );
    }

    function AboutStrip() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 pb-20">
          <div className="rounded-2xl border border-slate-800 bg-slate-950 p-8 flex flex-col md:flex-row items-center justify-between gap-8">
            <div className="max-w-xl">
              <h2 className="text-2xl text-white font-bold mb-4 uppercase tracking-tight">The Person Behind the Signal</h2>
              <p className="text-slate-400 leading-relaxed">
                I am a case agent focused on building smarter research systems. My work is designed to help anyone use professional investigative logic without needing a forensic degree.
              </p>
            </div>
            <a href="about.html" className="px-6 py-3 border border-slate-700 rounded-lg font-mono text-xs font-bold tracking-widest hover:bg-slate-800 transition-colors uppercase">View Experience</a>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="border-t border-slate-800 py-12 text-center">
          <div className="font-mono text-[10px] text-slate-600 tracking-[0.3em] uppercase mb-4">Signal & Trace // 2026</div>
          <div className="flex justify-center gap-6 text-[10px] font-mono text-slate-500 tracking-widest uppercase">
            <a href="tools.html" className="hover:text-cyan-400">Tools</a>
            <a href="how-to.html" className="hover:text-cyan-400">Guides</a>
            <a href="about.html" className="hover:text-cyan-400">About</a>
          </div>
        </footer>
      );
    }

    function App() {
      return (
        <div className="min-h-screen">
          <Navbar />
          <Hero />
          <StartHere />
          <FeatureGrid />
          <AboutStrip />
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
