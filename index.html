<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>

            sans: ['system-ui', 'sans-serif'],

  <style>

}

          </div>
        </footer>
      );

        <div className="min-h-screen bg-slate-950 text-slate-300 font-sans selection:bg-cyan-500/30">

          <CredibilityStrip />
          <FeaturedTool />

</body>
</html>
