<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Signal & Trace | Guided Research for Real-World Verification</title>
  <meta name="description" content="Signal & Trace gives beginners a guided path from one search target to organized findings, reports, visual summaries, slide decks, and more." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['system-ui', 'sans-serif'],
            display: ['"Orbitron"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(34,211,238,0.12), 0 12px 40px rgba(2,8,23,0.65)',
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: #cbd5e1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const NAV_ITEMS = [
      { label: 'HOME', href: 'index.html' },
      { label: 'TOOLS', href: 'tools.html' },
      { label: 'BLOG', href: 'blog.html' },
      { label: 'RESOURCES', href: 'resources.html' },
      { label: 'ABOUT', href: 'about.html' },
    ];

    function Navbar() {
      const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);

      return (
        <nav className="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <a href="index.html" className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl border border-cyan-500/30 bg-cyan-500/10 flex items-center justify-center text-cyan-400 font-bold shadow-glow">
                S
              </div>
              <div>
                <div className="font-mono text-[10px] text-cyan-400 tracking-[0.25em]">SIGNAL &amp;</div>
                <div className="font-display text-sm sm:text-lg text-slate-100 tracking-[0.14em]">TRACE</div>
              </div>
            </a>

            <div className="hidden md:flex gap-6 font-mono text-xs font-semibold tracking-widest text-slate-400">
              {NAV_ITEMS.map((item) => (
                <a
                  key={item.label}
                  href={item.href}
                  className={item.label === 'HOME' ? 'text-cyan-400' : 'hover:text-cyan-400 transition-colors'}
                >
                  {item.label}
                </a>
              ))}
            </div>

            <div className="md:hidden flex items-center">
              <button
                onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                className="text-slate-400 hover:text-cyan-400 focus:outline-none transition-colors p-2"
                aria-label="Toggle menu"
              >
                <svg className="w-6 h-6" fill="none" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" viewBox="0 0 24 24" stroke="currentColor">
                  {isMobileMenuOpen ? (
                    <path d="M6 18L18 6M6 6l12 12"></path>
                  ) : (
                    <path d="M4 6h16M4 12h16M4 18h16"></path>
                  )}
                </svg>
              </button>
            </div>

            <div className="md:hidden border-t border-slate-800 bg-slate-950/95 px-4 pt-2 pb-4 space-y-1 shadow-glow">
              {NAV_ITEMS.map((item) => (
                <a
                  key={item.label}
                  href={item.href}
                  className="block px-3 py-3 rounded-lg font-mono text-xs font-semibold tracking-widest text-slate-300 hover:bg-slate-900 hover:text-cyan-400 transition-colors"

                  {item.label}
                </a>
              ))}
            </div>
          )}

      );

      return (

          </div>

            Stop Searching. <br />
            <span className="text-cyan-400">Start Building A Real File.</span>
          </h1>

          <p className="text-slate-400 text-base sm:text-xl max-w-3xl mx-auto leading-relaxed mb-10">
            Signal &amp; Trace is a guided research system for people who need more than random search results. Start with one name, company, username, email, or topic and turn it into organized findings and usable outputs.
          </p>

          <div className="flex flex-col sm:flex-row justify-center gap-4">
            <a href="ai-workflows.html" className="px-8 py-4 rounded-xl bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 font-display text-sm tracking-widest font-bold hover:bg-cyan-500/20 transition-all shadow-glow">
              START HERE
            </a>
            <a href="tools.html" className="px-8 py-4 rounded-xl bg-slate-900 border border-slate-700 text-slate-100 font-display text-sm tracking-widest font-bold hover:bg-slate-800 transition-all">
              OPEN TOOLS
            </a>
          </div>
        </section>
      );
    }

        <section className="py-8 sm:py-10">

            <div className="max-w-4xl mb-10">
              <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-cyan-500/20 bg-cyan-500/10 text-cyan-400 font-mono text-[10px] tracking-[0.22em] uppercase mb-5">

              </h2>
              <p className="text-slate-400 text-base sm:text-xl leading-relaxed max-w-3xl">
                This is the core entry point for the site. It is built for people who are new, overloaded, or trying to get better structure fast. You start with one target and work toward organized findings, summaries, reports, visual breakdowns, slide decks, scripts, and more.

                <div className="font-mono text-xs tracking-[0.22em] text-cyan-400 mb-3">WHAT THIS IS</div>
                <p className="text-slate-300 leading-relaxed text-sm sm:text-base mb-4">

                </p>
                <ul className="space-y-3 text-slate-400 text-sm sm:text-base">

                  <li className="flex gap-3"><span className="text-cyan-400">02</span><span>Shows you what to search and what to keep</span></li>
                  <li className="flex gap-3"><span className="text-cyan-400">03</span><span>Organizes the useful material into a working file</span></li>

                  <li>Research summary</li>

                  <li>Scripted explainer</li>

              <div className="grid md:grid-cols-2 gap-5">
                <div className="rounded-2xl border border-slate-800 bg-slate-950/60 p-5">
                  <div className="font-mono text-[10px] tracking-[0.18em] uppercase text-cyan-400 mb-2">Step 1</div>
                  <h3 className="text-white font-bold text-lg mb-2">Start with the target</h3>
                  <p className="text-slate-400 text-sm leading-relaxed">
                    Enter the name, company, username, email, subject, or topic you want information on.

                <div className="rounded-2xl border border-slate-800 bg-slate-950/60 p-5">
                  <div className="font-mono text-[10px] tracking-[0.18em] uppercase text-cyan-400 mb-2">Step 2</div>
                  <h3 className="text-white font-bold text-lg mb-2">Run the search process</h3>
                  <p className="text-slate-400 text-sm leading-relaxed">
                    Use the tools and prompts to generate targeted searches. Review the returns carefully. More time and effort usually produces better results.

                <div className="rounded-2xl border border-slate-800 bg-slate-950/60 p-5">
                  <div className="font-mono text-[10px] tracking-[0.18em] uppercase text-cyan-400 mb-2">Step 3</div>
                  <h3 className="text-white font-bold text-lg mb-2">Keep the strongest findings</h3>
                  <p className="text-slate-400 text-sm leading-relaxed">
                    Copy and paste the returns that look relevant and useful. Avoid loading in too much overlap. You want signal, not clutter.
                  </p>
                </div>

                <div className="rounded-2xl border border-slate-800 bg-slate-950/60 p-5">
                  <div className="font-mono text-[10px] tracking-[0.18em] uppercase text-cyan-400 mb-2">Step 4</div>
                  <h3 className="text-white font-bold text-lg mb-2">Build finished outputs</h3>
                  <p className="text-slate-400 text-sm leading-relaxed">
                    Once the research file is built, use the workflow to turn it into reports, summaries, decks, scripts, infographics, or presentation-ready formats.

                </div>

                <div className="font-mono text-[10px] tracking-[0.18em] uppercase text-cyan-400 mb-2">Reality Check</div>
                <p className="text-slate-300 text-sm sm:text-base leading-relaxed">
                  This is not a magic button. It is a streamlined process. The better your judgment, effort, and input quality, the better the outputs.

                <p className="text-slate-400 text-sm sm:text-base leading-relaxed">

              </div>

              <div className="mt-6 flex flex-col sm:flex-row gap-3">
                <a href="ai-workflows.html" className="px-6 py-3 rounded-xl bg-cyan-500/15 border border-cyan-400/30 text-cyan-300 font-mono text-sm tracking-widest font-bold text-center shadow-glow">
                  OPEN THE WORKFLOW
                </a>
                <a href="tools.html" className="px-6 py-3 rounded-xl bg-slate-900/70 border border-slate-700 text-slate-100 font-mono text-sm tracking-widest font-bold text-center">
                  OPEN THE TOOLS
                </a>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function SecondaryPaths() {
      const CARDS = [
        {
          title: "TOOLS",
          desc: "Use the builders to create targeted search strings for names, handles, emails, domains, and broader targets.",
          link: "tools.html",
          icon: "🛠️"
        },
        {
          title: "BLOG",
          desc: "Read the supporting guides, workflows, prompts, and case-driven thinking behind the system.",
          link: "blog.html",
          icon: "📚"
        },
        {
          title: "CASE REVIEWS",
          desc: "See how the logic works in real situations, including scam analysis and structured breakdowns.",
          link: "case-reviews.html",
          icon: "📑"
        },
        {
          title: "RESOURCE VAULT",
          desc: "Access downloads, PDFs, and supporting material that extend the workflow.",
          link: "resources.html",
          icon: "🗄️"
        }
      ];

      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-12">
          <div className="mb-8">
            <div className="font-mono text-xs tracking-[0.22em] text-cyan-400 mb-3 uppercase">Secondary Paths</div>
            <h2 className="text-2xl sm:text-3xl text-white font-bold uppercase tracking-tight">
              Once you understand the system, go deeper where you need to.

          </div>

          <div className="grid sm:grid-cols-2 gap-6">
            {CARDS.map((card, i) => (
              <div key={i} className="group rounded-2xl border border-slate-800 bg-slate-900/40 p-8 hover:border-cyan-500/30 transition-all shadow-glow">
                <div className="text-4xl mb-5">{card.icon}</div>
                <h3 className="text-2xl font-bold text-white mb-4 uppercase tracking-tight">{card.title}</h3>
                <p className="text-slate-400 leading-relaxed mb-8">{card.desc}</p>
                <a href={card.link} className="inline-flex items-center text-cyan-500 font-mono text-xs tracking-widest font-bold group-hover:gap-2 transition-all uppercase">
                  Open &rarr;
                </a>
              </div>
            ))}
          </div>
        </section>
      );

            <h2 className="text-2xl sm:text-3xl font-bold text-white mb-4 uppercase tracking-wider">
              Investigative logic, rebuilt into a repeatable workflow.
            </h2>
            <p className="text-slate-400 text-base sm:text-lg leading-relaxed mb-8 max-w-3xl">
              Signal &amp; Trace is built around a simple idea: most people do not need more noise, they need better structure. The goal is to make professional-style research logic more usable for normal people without pretending the process is effortless.
            </p>
            <a href="about.html" className="inline-block px-8 py-4 rounded-xl border border-slate-700 text-slate-100 font-mono text-xs tracking-widest font-bold hover:bg-slate-800 transition-all">
              VIEW BACKGROUND
            </a>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="border-t border-slate-800 py-12 bg-slate-950/50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col items-center">
            <div className="font-display text-[14px] text-slate-600 tracking-[0.4em] mb-8">
              SIGNAL &amp; TRACE // 2026
            </div>
            <div className="flex gap-8 font-mono text-[10px] text-slate-400 tracking-[0.2em] font-bold">
              <a href="tools.html" className="hover:text-cyan-400">TOOLS</a>
              <a href="blog.html" className="hover:text-cyan-400">BLOG</a>
              <a href="resources.html" className="hover:text-cyan-400">RESOURCES</a>
              <a href="about.html" className="hover:text-cyan-400">ABOUT</a>
            </div>
          </div>
        </footer>
      );
    }

    function App() {
      return (
        <div className="min-h-screen bg-slate-950 font-sans selection:bg-cyan-500/30">
          <Navbar />
          <Hero />
          <StartHereSection />
          <SecondaryPaths />
          <AboutSection />
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
