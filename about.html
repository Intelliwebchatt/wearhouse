<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>About Shane Lockhart | Signal & Trace</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['system-ui', 'sans-serif'],
            display: ['"Orbitron"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(34,211,238,0.12), 0 12px 40px rgba(2,8,23,0.65)',
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: #cbd5e1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const NAV_ITEMS = [
      { label: 'HOME', href: 'index.html' },
      { label: 'TOOLS', href: 'tools.html' },
      { label: 'HOW-TO', href: 'how-to.html' },
      { label: 'CASE REVIEWS', href: 'case-reviews.html' },
      { label: 'AI WORKFLOWS', href: 'ai-workflows.html' },
      { label: 'ABOUT', href: 'about.html' },
    ];

    const DATA = {
      positions: [
        { cat: 'INVESTIGATIONS', roles: ['Criminal Investigator', 'Lieutenant Investigator', 'Drug & Violent Crimes Task Force', 'Deputy Sheriff'] },
        { cat: 'LEADERSHIP', roles: ['Patrol Supervisor', 'Jail Administrator', 'Corrections Officer'] },
        { cat: 'EMERGENCY', roles: ['Tactical Operator / Sniper-Observer', 'Volunteer Firefighter', 'Emergency Medical Technician (EMT)'] }
      ],
      training: [
        { cat: 'INVESTIGATIVE LOGIC', items: ['Reid Technique (Basic & Advanced)', 'Kinesic Interview & Interrogation', 'Homicide Investigations', 'Medical Death Investigation', 'Child Sexual Abuse Investigation', 'Informant Management', 'Pharmaceutical Diversions'] },
        { cat: 'FORENSICS & EVIDENCE', items: ['Crime Scene Technology', 'Arson Scene Search & Evidence Recovery', 'Electrical Fire Investigation', 'Drug Identification Training'] },
        { cat: 'TACTICAL OPS', items: ['SWAT', 'FBI Basic & Advanced Sniper/Observer', 'Explosive Breaching', 'Tactical Woodland Operations', 'Multiple Terrorist Response Training', 'Hostage / Anti-Terror Training'] },
        { cat: 'ADMIN & PUBLIC SAFETY', items: ['APOSTC Certification', 'Jail Administration & Management', 'Criminal Interdiction', 'Traffic Radar & Breath Alcohol Testing', 'Less-Lethal Launcher Instructor'] }
      ]
    };

    function Navbar() {
      return (
        <nav className="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <a href="index.html" className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl border border-cyan-500/30 bg-cyan-500/10 flex items-center justify-center text-cyan-400 font-bold shadow-glow uppercase">S</div>
              <div>
                <div className="font-mono text-[10px] text-cyan-400 tracking-[0.25em] uppercase">Signal &</div>
                <div className="font-display text-sm sm:text-lg text-slate-100 tracking-[0.14em] uppercase">Trace</div>
              </div>
            </a>
            <div className="hidden lg:flex gap-5 font-mono text-[11px] font-semibold tracking-[0.16em] text-slate-400 uppercase">
              {NAV_ITEMS.map((item) => (
                <a key={item.label} href={item.href} className={item.label === 'ABOUT' ? 'text-cyan-400' : 'hover:text-cyan-300'}>{item.label}</a>
              ))}
            </div>
          </div>
        </nav>
      );
    }

    function Hero() {
      return (
        <section className="relative py-16 sm:py-24 border-b border-slate-800 bg-gradient-to-b from-slate-950 to-slate-900/50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6">
            <div className="max-w-3xl">
              <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-cyan-500/20 bg-cyan-500/10 text-cyan-400 font-mono text-[10px] uppercase mb-6 tracking-widest">
                Shane Lockhart // Background // Case Logic
              </div>
              <h1 className="font-display text-4xl sm:text-6xl text-white mb-6 uppercase leading-tight">
                About <span className="text-cyan-400">Shane Lockhart</span>
              </h1>
              <p className="text-slate-400 text-lg sm:text-xl leading-relaxed">
                Signal & Trace is the public application of twenty years in criminal investigations, tactical operations, and emergency response. This site exists to bridge the gap between professional investigative logic and everyday research.
              </p>
            </div>
          </div>
        </section>
      );
    }

    function SectionHeader({ title, subtitle }) {
      return (
        <div className="mb-10">
          <div className="font-mono text-xs tracking-[0.2em] text-cyan-400 mb-2 uppercase italic">// {subtitle}</div>
          <h2 className="text-3xl text-white font-bold uppercase tracking-tight">{title}</h2>
        </div>
      );
    }

    function App() {
      return (
        <div className="min-h-screen">
          <Navbar />
          <Hero />

          <section className="max-w-7xl mx-auto px-4 sm:px-6 py-16">
            <SectionHeader title="Professional History" subtitle="Experience" />
            <div className="grid md:grid-cols-3 gap-6">
              {DATA.positions.map((group) => (
                <div key={group.cat} className="p-6 rounded-2xl border border-slate-800 bg-slate-900/40 shadow-glow">
                  <h3 className="text-cyan-400 font-mono text-[10px] font-bold uppercase mb-4 tracking-widest">{group.cat}</h3>
                  <ul className="space-y-3 text-sm text-slate-300">
                    {group.roles.map(role => <li key={role} className="flex gap-2"><span>•</span>{role}</li>)}
                  </ul>
                </div>
              ))}
            </div>
          </section>

          <section className="bg-slate-900/30 border-y border-slate-800 py-16">
            <div className="max-w-7xl mx-auto px-4 sm:px-6">
              <SectionHeader title="Technical Training" subtitle="Certifications" />
              <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                {DATA.training.map((group) => (
                  <div key={group.cat} className="p-6 rounded-2xl border border-slate-800 bg-slate-950 shadow-glow">
                    <h3 className="text-cyan-400 font-mono text-[10px] font-bold uppercase mb-4 tracking-widest">{group.cat}</h3>
                    <ul className="space-y-2 text-[11px] text-slate-400 leading-relaxed">
                      {group.items.map(item => <li key={item} className="flex gap-2"><span>•</span>{item}</li>)}
                    </ul>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="max-w-7xl mx-auto px-4 sm:px-6 py-16 pb-24">
            <div className="rounded-3xl border border-slate-800 bg-gradient-to-br from-slate-900 to-slate-950 p-8 sm:p-12 shadow-glow">
              <h2 className="text-2xl sm:text-3xl text-white font-bold mb-6 uppercase tracking-tight">Investigative Focus</h2>
              <div className="grid md:grid-cols-2 gap-10 text-slate-400 text-sm sm:text-base leading-relaxed">
                <p>Throughout my career as a lead investigator in capital murder, felony assault, and task force operations, the mission was always finding the <strong>Signal</strong>—the usable evidence—buried in the <strong>Trace</strong> of noise and deception. </p>
                <p>This site is not a fake "authority" portal. It is a collection of the same disciplined reasoning, dorking methods, and evidence structures I used in the field, now adapted for public research and verification.</p>
              </div>
            </div>
          </section>

          <footer className="border-t border-slate-800 py-12 text-center">
            <div className="font-mono text-[10px] text-slate-600 tracking-[0.3em] uppercase mb-4">Signal & Trace // Shane Lockhart</div>
            <div className="flex justify-center gap-6 text-[10px] font-mono text-slate-500 tracking-widest uppercase italic">
              <a href="index.html" className="hover:text-cyan-400">Home</a>
              <a href="tools.html" className="hover:text-cyan-400">Tools</a>
              <a href="how-to.html" className="hover:text-cyan-400">Guides</a>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
