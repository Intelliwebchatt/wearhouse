<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Signal & Trace | Stop Searching. Start Finding.</title>
  <meta name="description" content="Professional-grade search tools and AI workflows designed for normal people." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['system-ui', 'sans-serif'],
            display: ['"Orbitron"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            glow: '0 0 0 1px rgba(34,211,238,0.12), 0 12px 40px rgba(2,8,23,0.65)',
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: #cbd5e1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const NAV_ITEMS = [
      { label: 'HOME', href: 'index.html' },
      { label: 'TOOLS', href: 'tools.html' },
      { label: 'BLOG', href: 'blog.html' },
      { label: 'CASE REVIEWS', href: 'case-reviews.html' },
      { label: 'AI WORKFLOWS', href: 'ai-workflows.html' },
      { label: 'ABOUT', href: 'about.html' },
    ];

    function Navbar() {
      const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);

      return (
        <nav className="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            {/* Brand Logo */}
            <a href="index.html" className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl border border-cyan-500/30 bg-cyan-500/10 flex items-center justify-center text-cyan-400 font-bold shadow-glow">S</div>
              <div>
                <div className="font-mono text-[10px] text-cyan-400 tracking-[0.25em]">SIGNAL &amp;</div>
                <div className="font-display text-sm sm:text-lg text-slate-100 tracking-[0.14em]">TRACE</div>
              </div>
            </a>

            {/* Desktop Navigation */}
            <div className="hidden md:flex gap-6 font-mono text-xs font-semibold tracking-widest text-slate-400">
              {NAV_ITEMS.map((item) => (
                <a key={item.label} href={item.href} className="hover:text-cyan-400 transition-colors">
                  {item.label}
                </a>
              ))}
            </div>

            {/* Mobile Navigation Toggle */}
            <div className="md:hidden flex items-center">
              <button 
                onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                className="text-slate-400 hover:text-cyan-400 focus:outline-none transition-colors p-2"
                aria-label="Toggle menu"
              >
                <svg className="w-6 h-6" fill="none" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" viewBox="0 0 24 24" stroke="currentColor">
                  {isMobileMenuOpen ? (
                    <path d="M6 18L18 6M6 6l12 12"></path>
                  ) : (
                    <path d="M4 6h16M4 12h16M4 18h16"></path>
                  )}
                </svg>
              </button>
            </div>
          </div>

          {/* Mobile Navigation Dropdown */}
          {isMobileMenuOpen && (
            <div className="md:hidden border-t border-slate-800 bg-slate-950/95 px-4 pt-2 pb-4 space-y-1">
              {NAV_ITEMS.map((item) => (
                <a 
                  key={item.label} 
                  href={item.href} 
                  className="block px-3 py-3 rounded-lg font-mono text-xs font-semibold tracking-widest text-slate-300 hover:bg-slate-900 hover:text-cyan-400 transition-colors"
                >
                  {item.label}
                </a>
              ))}
            </div>
          )}
        </nav>
      );
    }

    function Hero() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-16 text-center">
            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-cyan-500/20 bg-cyan-500/10 text-cyan-400 font-mono text-[10px] tracking-[0.22em] uppercase mb-10">
                Digital Investigation · Verification · AI Analysis
            </div>
            <h1 className="font-display text-4xl sm:text-6xl text-white mb-4 uppercase tracking-tighter">
                Stop Searching. <br/>
                <span className="text-cyan-400">Start Finding.</span>
            </h1>
            <p className="text-slate-400 text-base sm:text-lg max-w-2xl mx-auto leading-relaxed mb-10">
                Professional-grade search tools and AI workflows designed for normal people who need to verify facts, find people, or research businesses without the noise.
            </p>
            <div className="flex flex-col sm:flex-row justify-center gap-4">
                <a href="tools.html" className="px-8 py-4 rounded-xl bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 font-display text-sm tracking-widest font-bold hover:bg-cyan-500/20 transition-all">
                    EXPLORE TOOLS
                </a>
                <a href="blog.html" className="px-8 py-4 rounded-xl bg-slate-900 border border-slate-700 text-slate-100 font-display text-sm tracking-widest font-bold hover:bg-slate-800 transition-all">
                    BROWSE GUIDES
                </a>
            </div>
        </section>
      );
    }

    function FeaturedArticle() {
      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
            <div className="rounded-2xl border border-slate-800 bg-slate-900/50 p-8 shadow-glow relative overflow-hidden group">
                <div className="absolute right-8 top-1/2 -translate-y-1/2 font-display text-9xl text-slate-800/20 pointer-events-none">01</div>
                <div className="relative z-10">
                    <div className="font-mono text-[10px] tracking-[0.3em] text-cyan-400 mb-6 uppercase">Essential Reading</div>
                    <h2 className="text-3xl sm:text-4xl text-white font-bold mb-6 max-w-xl">
                        New to Research? Start with the "Partner" System.
                    </h2>
                    <p className="text-slate-400 text-lg max-w-2xl leading-relaxed mb-8">
                        The internet is noisy. To find the truth, you need a system. Learn how I use NotebookLM and Gemini as a "Digital Case File" to organize scattered leads into clear facts.
                    </p>
                    <a href="posts/ai-research-workflows.html" className="inline-flex items-center text-cyan-400 font-mono text-xs tracking-widest font-bold group-hover:gap-2 transition-all">
                        READ THE METHODOLOGY &rarr;
                    </a>
                </div>
            </div>
        </section>
      );
    }

    function FeatureGrid() {
      const CARDS = [
        {
          title: "Coming Soon",
          desc: "New investigative modules and automated verification routines in development.",
          link: "coming-soon.html",
          icon: "🚀"
        },
        {
          title: "AI Workflows and Prompts that Work",
          desc: "Step-by-step instructions on using AI partners to pressure-test evidence and map networks.",
          link: "ai-workflows.html",
          icon: "⚙️"
        },
        {
          title: "Case Reviews",
          desc: "Real-world breakdowns of scams and suspicious claims using public evidence, including the myIQ investigation.",
          link: "case-reviews.html",
          icon: "📑"
        },
        {
          title: "Resource Vault",
          desc: "Cheat sheets, diagrams, checklists, downloads, and other useful links to keep your investigation on track.",
          link: "resources.html",
          icon: "🗄️"
        }
      ];

      return (
        <section className="max-w-7xl mx-auto px-4 sm:px-6 py-12">
          <div className="grid sm:grid-cols-2 lg:grid-cols-2 gap-6">
            {CARDS.map((card, i) => (
              <div key={i} className="group rounded-2xl border border-slate-800 bg-slate-900/40 p-10 hover:border-cyan-500/30 transition-all shadow-glow">
                <div className="text-4xl mb-6">{card.icon}</div>
                <h3 className="text-2xl font-bold text-white mb-4">{card.title}</h3>
                <p className="text-slate-400 leading-relaxed mb-8">{card.desc}</p>
                <a href={card.link} className="inline-flex items-center text-cyan-500 font-mono text-xs tracking-widest font-bold group-hover:gap-2 transition-all uppercase">
                    Open &rarr;
                </a>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function AboutSection() {
        return (
            <section className="max-w-7xl mx-auto px-4 sm:px-6 py-12 pb-24">
                <div className="rounded-2xl border border-slate-800 bg-slate-900/30 p-10">
                    <h2 className="text-2xl font-bold text-white mb-4 uppercase tracking-wider">The Investigator Behind the Site</h2>
                    <p className="text-slate-400 text-lg leading-relaxed mb-10 max-w-3xl">
                        I am a case agent focused on building smarter research systems. My work is designed to help anyone use professional investigative logic without needing a forensic degree.
                    </p>
                    <a href="about.html" className="inline-block px-8 py-4 rounded-xl border border-slate-700 text-slate-100 font-mono text-xs tracking-widest font-bold hover:bg-slate-800 transition-all">
                        VIEW EXPERIENCE
                    </a>
                </div>
            </section>
        );
    }

    function Footer() {
      return (
        <footer className="border-t border-slate-800 py-12 bg-slate-950/50">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col items-center">
            <div className="font-mono text-[10px] text-slate-600 tracking-[0.4em] mb-8">
                SIGNAL &amp; TRACE // 2026
            </div>
            <div className="flex gap-8 font-mono text-[10px] text-slate-400 tracking-[0.2em] font-bold">
                <a href="tools.html" className="hover:text-cyan-400">TOOLS</a>
                <a href="blog.html" className="hover:text-cyan-400">GUIDES</a>
                <a href="about.html" className="hover:text-cyan-400">ABOUT</a>
            </div>
          </div>
        </footer>
      );
    }

    function App() {
      return (
        <div className="min-h-screen bg-slate-950 font-sans selection:bg-cyan-500/30">
          <Navbar />
          <Hero />
          <FeaturedArticle />
          <FeatureGrid />
          <AboutSection />
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
